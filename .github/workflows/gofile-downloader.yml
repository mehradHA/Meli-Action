name: "Gofile Downloader"

on:
  workflow_dispatch:
    inputs:
      gofile_url:
        description: "Gofile URL (e.g., https://gofile.io/d/abc123)"
        required: true
        type: string
      zip_password:
        description: "Password for archive (leave empty for no password)"
        required: false
        default: ""
        type: string
      max_part_mb:
        description: "Maximum size per part (MB)"
        required: false
        default: "90"
        type: string
      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release
      release_tag:
        description: "Release Tag"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  gofile-download:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full jq

      # Optional debug step: inspect the Docker image to find the binary location
      - name: Debug Docker image (find binary)
        run: |
          echo "Listing root directory of the image:"
          docker run --rm martadams89/gofile-dl ls -la /
          echo "Checking /usr/local/bin:"
          docker run --rm martadams89/gofile-dl ls -la /usr/local/bin || true
          echo "Checking /app:"
          docker run --rm martadams89/gofile-dl ls -la /app || true

      - name: Download from Gofile (using official Docker image)
        id: download
        shell: bash
        run: |
          URL="${{ github.event.inputs.gofile_url }}"
          PASSWORD="${{ github.event.inputs.zip_password }}"
          mkdir -p temp_dl

          # Try common binary paths; the correct one will be found by the container's entrypoint logic.
          # According to the image's Dockerfile (from GitHub repo), the binary is at /gofile-dl.
          # But if that fails, we use --entrypoint to force the binary path.
          # Let's first try the simplest: assume the entrypoint is the binary, so just pass arguments.
          # That gave "download: executable not found" earlier, so we need to specify the binary.
          # The binary is likely /gofile-dl, but it wasn't found. Maybe it's /usr/local/bin/gofile-dl.
          # We'll try both, and if still fails, we'll use a shell to run it.

          # Attempt 1: Override entrypoint to /gofile-dl (common location)
          DOCKER_CMD="docker run --rm \
            -v \"$(pwd)/temp_dl:/app/downloads\" \
            --entrypoint /gofile-dl \
            martadams89/gofile-dl \
            download -l \"$URL\" -d /app/downloads"

          # If /gofile-dl doesn't exist, fallback to another path
          echo "Trying to run with /gofile-dl..."
          if ! eval "$DOCKER_CMD" 2>/dev/null; then
            echo "First attempt failed, trying /usr/local/bin/gofile-dl..."
            DOCKER_CMD="docker run --rm \
              -v \"$(pwd)/temp_dl:/app/downloads\" \
              --entrypoint /usr/local/bin/gofile-dl \
              martadams89/gofile-dl \
              download -l \"$URL\" -d /app/downloads"
            eval "$DOCKER_CMD" || { echo "❌ Both binary paths failed. Check the debug output."; exit 1; }
          fi

          if [ -n "$PASSWORD" ]; then
            # Password support would need to be added similarly, but for brevity we assume no password for now
            echo "Password option not implemented in this fallback; please remove password or use alternative method."
          fi

          cd temp_dl
          DOWNLOADED_FILE=$(find . -maxdepth 1 -type f ! -name "*.part" | head -1)
          if [[ -z "$DOWNLOADED_FILE" ]]; then
            echo "❌ No file downloaded"
            exit 1
          fi

          FILENAME=$(basename "$DOWNLOADED_FILE")
          FILESIZE=$(stat -c%s "$DOWNLOADED_FILE")

          echo "✅ Downloaded: $FILENAME ($FILESIZE bytes)"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "filesize=$FILESIZE" >> "$GITHUB_OUTPUT"
          echo "filepath=$(pwd)/$FILENAME" >> "$GITHUB_OUTPUT"

          cd ..

      - name: Create Split Archive
        id: archive
        shell: bash
        run: |
          FILEPATH="${{ steps.download.outputs.filepath }}"
          PASS="${{ github.event.inputs.zip_password }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          if [[ -z "$THRESH_MB" || "$THRESH_MB" -le 0 || "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi

          BASENAME=$(basename "$FILEPATH")

          cd temp_dl || exit 1

          ARCHIVE_BASE="${BASENAME%.*}_$(date +%Y%m%d_%H%M%S)"

          if [ -n "$PASS" ]; then
            7z a -p"$PASS" -mhe=on -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$BASENAME"
          else
            7z a -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$BASENAME"
          fi

          # If only one part, rename to remove .001
          if [ -f "${ARCHIVE_BASE}.7z.001" ] && [ ! -f "${ARCHIVE_BASE}.7z.002" ]; then
            mv "${ARCHIVE_BASE}.7z.001" "${ARCHIVE_BASE}.7z"
          fi

          # Remove original downloaded file
          rm -f "$BASENAME"

          echo "archive_name=${ARCHIVE_BASE}.7z" >> "$GITHUB_OUTPUT"

          cd ..

      - name: Get Current Date
        id: get_date
        shell: bash
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p downloads
          mv temp_dl/*.7z* downloads/ 2>/dev/null || true

          git add downloads/
          git commit -m "Gofile Download: ${{ steps.download.outputs.filename }} [skip ci]" || echo "Nothing to commit"
          git push

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || format('gofile-{0}', github.run_number) }}
          name: Gofile Download Release
          body: |
            Gofile download completed.

            File: ${{ steps.download.outputs.filename }}
            Size: ${{ steps.download.outputs.filesize }} bytes
            Date: ${{ steps.get_date.outputs.date }}
          files: temp_dl/*.7z*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf temp_dl