name: "Gofile Downloader"

on:
  workflow_dispatch:
    inputs:
      gofile_url:
        description: "Gofile URL (e.g., https://gofile.io/d/abc123)"
        required: true
        type: string
      zip_password:
        description: "Password for archive (leave empty for no password)"
        required: false
        default: ""
        type: string
      max_part_mb:
        description: "Maximum size per part (MB)"
        required: false
        default: "90"
        type: string
      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release
      release_tag:
        description: "Release Tag"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  gofile-download:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full curl jq

      - name: Download from Gofile (Direct API)
        id: download
        shell: bash
        run: |
          URL="${{ github.event.inputs.gofile_url }}"
          PASSWORD="${{ github.event.inputs.zip_password }}"
          
          mkdir -p temp_dl
          cd temp_dl

          # Extract file ID from URL
          if [[ $URL =~ gofile\.io/d/([a-zA-Z0-9]+) ]]; then
            FILE_ID="${BASH_REMATCH[1]}"
          else
            echo "❌ Invalid Gofile URL"
            exit 1
          fi
          echo "File ID: $FILE_ID"

          # 1. Create a guest account (get token)
          echo "🔄 Creating guest account..."
          TOKEN_RESPONSE=$(curl -s -X POST 'https://gofile.io/api/accounts')
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.data.token')
          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "❌ Failed to get token"
            echo "Response: $TOKEN_RESPONSE"
            exit 1
          fi
          echo "✅ Token obtained"

          # 2. Get file contents
          echo "📡 Fetching file info..."
          CONTENT_URL="https://gofile.io/api/contents/$FILE_ID?token=$TOKEN"
          CONTENT_RESPONSE=$(curl -s "$CONTENT_URL")
          STATUS=$(echo "$CONTENT_RESPONSE" | jq -r '.status')

          if [[ "$STATUS" != "ok" ]]; then
            echo "❌ API error: $STATUS"
            echo "Response: $CONTENT_RESPONSE"
            exit 1
          fi

          # Extract first file (assuming single file in container)
          CONTENT_ID=$(echo "$CONTENT_RESPONSE" | jq -r '.data.contents | keys[0]')
          FILENAME=$(echo "$CONTENT_RESPONSE" | jq -r ".data.contents[\"$CONTENT_ID\"].name")
          SIZE=$(echo "$CONTENT_RESPONSE" | jq -r ".data.contents[\"$CONTENT_ID\"].size")
          DOWNLOAD_LINK=$(echo "$CONTENT_RESPONSE" | jq -r ".data.contents[\"$CONTENT_ID\"].link")

          if [[ -z "$FILENAME" || "$FILENAME" == "null" ]]; then
            echo "❌ No file found in container"
            exit 1
          fi

          echo "📄 File: $FILENAME"
          echo "📦 Size: $SIZE bytes"

          # 3. Download the file
          echo "⬇️ Downloading..."
          curl -L --fail --retry 3 --retry-delay 2 -o "$FILENAME" "$DOWNLOAD_LINK"

          if [[ ! -f "$FILENAME" ]]; then
            echo "❌ Download failed"
            exit 1
          fi

          echo "✅ Download complete"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "filesize=$SIZE" >> "$GITHUB_OUTPUT"
          echo "filepath=$(pwd)/$FILENAME" >> "$GITHUB_OUTPUT"

          cd ..

      - name: Create Split Archive
        id: archive
        shell: bash
        run: |
          FILEPATH="${{ steps.download.outputs.filepath }}"
          PASS="${{ github.event.inputs.zip_password }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          if [[ -z "$THRESH_MB" || "$THRESH_MB" -le 0 || "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi

          BASENAME=$(basename "$FILEPATH")

          cd temp_dl || exit 1

          ARCHIVE_BASE="${BASENAME%.*}_$(date +%Y%m%d_%H%M%S)"

          if [ -n "$PASS" ]; then
            7z a -p"$PASS" -mhe=on -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$BASENAME"
          else
            7z a -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$BASENAME"
          fi

          # If only one part, rename to remove .001
          if [ -f "${ARCHIVE_BASE}.7z.001" ] && [ ! -f "${ARCHIVE_BASE}.7z.002" ]; then
            mv "${ARCHIVE_BASE}.7z.001" "${ARCHIVE_BASE}.7z"
          fi

          # Remove original file
          rm -f "$BASENAME"

          echo "archive_name=${ARCHIVE_BASE}.7z" >> "$GITHUB_OUTPUT"

          cd ..

      - name: Get Current Date
        id: get_date
        shell: bash
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p downloads
          mv temp_dl/*.7z* downloads/ 2>/dev/null || true

          git add downloads/
          git commit -m "Gofile Download: ${{ steps.download.outputs.filename }} [skip ci]" || echo "Nothing to commit"
          git push

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || format('gofile-{0}', github.run_number) }}
          name: Gofile Download Release
          body: |
            Gofile download completed.

            File: ${{ steps.download.outputs.filename }}
            Size: ${{ steps.download.outputs.filesize }} bytes
            Date: ${{ steps.get_date.outputs.date }}
          files: temp_dl/*.7z*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf temp_dl