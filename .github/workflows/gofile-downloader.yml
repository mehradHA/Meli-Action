name: "Gofile Downloader"

on:
  workflow_dispatch:
    inputs:
      gofile_url:
        description: "Gofile URL (e.g., https://gofile.io/d/abc123)"
        required: true
        type: string

      zip_password:
        description: "Password for archive (leave empty for no password)"
        required: false
        default: ""
        type: string

      max_part_mb:
        description: "Maximum size per part (MB)"
        required: false
        default: "90"
        type: string

      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release

      release_tag:
        description: "Release Tag"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  gofile-download:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full curl jq

      - name: Get Download Info
        id: info
        shell: bash
        run: |
          GOFILE_URL="${{ github.event.inputs.gofile_url }}"

          # Extract file ID from URL (e.g., https://gofile.io/d/abc123 -> abc123)
          if [[ $GOFILE_URL =~ gofile\.io/d/([a-zA-Z0-9]+) ]]; then
            FILE_ID="${BASH_REMATCH[1]}"
          else
            echo "❌ Invalid Gofile URL format. Expected: https://gofile.io/d/XXXXX"
            exit 1
          fi

          echo "📝 File ID: $FILE_ID"

          # 1. Get a guest account token
          echo "🔑 Getting guest token..."
          TOKEN_RESPONSE=$(curl -s -X POST 'https://api.gofile.io/accounts')
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.data.token')

          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "❌ Failed to get guest token"
            echo "API Response: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "✅ Guest token obtained"

          # 2. Extract website token from Gofile's JavaScript
          echo "🌐 Extracting website token..."
          JS_URL="https://gofile.io/dist/js/alljs.js"
          JS_CONTENT=$(curl -s "$JS_URL")
          WEBSITE_TOKEN=$(echo "$JS_CONTENT" | grep -oP "fetchData\.wt\s*=\s*['\"]\K[^'\"]+" | head -1)

          if [[ -z "$WEBSITE_TOKEN" ]]; then
            echo "⚠️ Could not extract website token, proceeding without it (may fail for some files)"
            WEBSITE_TOKEN=""
          else
            echo "✅ Website token obtained"
          fi

          # 3. Get content info using the correct endpoint
          echo "📡 Fetching content info for ID: $FILE_ID"
          API_URL="https://api.gofile.io/getContent?contentId=$FILE_ID&token=$TOKEN&wt=$WEBSITE_TOKEN&cache=true"
          CONTENT_RESPONSE=$(curl -s "$API_URL")
          STATUS=$(echo "$CONTENT_RESPONSE" | jq -r '.status')

          echo "API Response Status: $STATUS"

          # Check if password is required
          if [[ "$STATUS" == "error-passwordRequired" ]]; then
            echo "🔐 This file is password protected"
            if [[ -n "${{ github.event.inputs.zip_password }}" ]]; then
              PASSWORD_HASH=$(echo -n "${{ github.event.inputs.zip_password }}" | sha256sum | cut -d' ' -f1)
              echo "Using provided password"
              CONTENT_RESPONSE=$(curl -s "$API_URL&password=$PASSWORD_HASH")
              STATUS=$(echo "$CONTENT_RESPONSE" | jq -r '.status')
            else
              echo "❌ Password required but not provided"
              exit 1
            fi
          fi

          if [[ "$STATUS" != "ok" ]]; then
            echo "❌ Failed to get content info"
            echo "API Response: $CONTENT_RESPONSE"
            exit 1
          fi

          # Parse the response to get file information
          # Note: The API returns contents as an object, not an array
          FIRST_CONTENT_ID=$(echo "$CONTENT_RESPONSE" | jq -r '.data.contents | keys[0]')
          FILENAME=$(echo "$CONTENT_RESPONSE" | jq -r ".data.contents[\"$FIRST_CONTENT_ID\"].name")
          FILESIZE=$(echo "$CONTENT_RESPONSE" | jq -r ".data.contents[\"$FIRST_CONTENT_ID\"].size")
          FILE_LINK=$(echo "$CONTENT_RESPONSE" | jq -r ".data.contents[\"$FIRST_CONTENT_ID\"].link")

          if [[ -z "$FILENAME" || "$FILENAME" == "null" ]]; then
            echo "❌ Failed to extract filename"
            echo "API Response: $CONTENT_RESPONSE"
            exit 1
          fi

          if [[ -z "$FILE_LINK" || "$FILE_LINK" == "null" ]]; then
            echo "❌ No download link returned"
            exit 1
          fi

          # Sanitize filename
          FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._() -]/_/g')

          echo "✅ File found: $FILENAME"
          echo "📦 Size: $FILESIZE bytes"

          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "download_url=$FILE_LINK" >> "$GITHUB_OUTPUT"
          echo "filesize=$FILESIZE" >> "$GITHUB_OUTPUT"

      - name: Download File
        id: download
        shell: bash
        run: |
          mkdir -p temp_dl

          DOWNLOAD_URL="${{ steps.info.outputs.download_url }}"
          FILENAME="${{ steps.info.outputs.filename }}"

          echo "⬇️ Downloading: $FILENAME"
          echo "🔗 Download URL: $DOWNLOAD_URL"

          # Use curl with follow redirects, resume support, and retries
          curl -L --fail --retry 3 --retry-delay 2 \
            -o "temp_dl/$FILENAME" \
            "$DOWNLOAD_URL"

          echo "✅ Download complete"
          echo "filepath=temp_dl/$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Create Split Archive
        id: archive
        shell: bash
        run: |
          FILEPATH="${{ steps.download.outputs.filepath }}"
          PASS="${{ github.event.inputs.zip_password }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          if [[ -z "$THRESH_MB" || "$THRESH_MB" -le 0 || "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi

          BASENAME=$(basename "$FILEPATH")

          cd temp_dl || exit 1

          ARCHIVE_BASE="${BASENAME%.*}_$(date +%Y%m%d_%H%M%S)"

          if [ -n "$PASS" ]; then
            7z a -p"$PASS" -mhe=on -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$BASENAME"
          else
            7z a -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$BASENAME"
          fi

          # If only one part was created, rename it to remove the .001 extension
          if [ -f "${ARCHIVE_BASE}.7z.001" ] && [ ! -f "${ARCHIVE_BASE}.7z.002" ]; then
            mv "${ARCHIVE_BASE}.7z.001" "${ARCHIVE_BASE}.7z"
          fi

          # Remove original downloaded file to avoid committing large raw files
          if [ -f "$BASENAME" ]; then
            rm -f "$BASENAME"
          fi

          echo "archive_name=${ARCHIVE_BASE}.7z" >> "$GITHUB_OUTPUT"

          cd ..

      - name: Get Current Date
        id: get_date
        shell: bash
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p downloads

          mv temp_dl/*.7z* downloads/ 2>/dev/null || true

          git add downloads/

          git commit -m "Gofile Download: ${{ steps.info.outputs.filename }} [skip ci]" || echo "Nothing to commit"

          git push

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || format('gofile-{0}', github.run_number) }}
          name: Gofile Download Release
          body: |
            Gofile download completed.

            File: ${{ steps.info.outputs.filename }}
            Size: ${{ steps.info.outputs.filesize }} bytes
            Date: ${{ steps.get_date.outputs.date }}
          files: temp_dl/*.7z*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf temp_dl